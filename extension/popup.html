<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Phish-Guard</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0b0d;
      color: #fff;
      padding: 20px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .header h2 {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
    }

    .header span {
      font-size: 22px;
    }

    .status-card {
      background: rgba(0, 82, 255, 0.1);
      border: 1px solid rgba(0, 82, 255, 0.3);
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: #00D395;
      border-radius: 50%;
      animation: pulse 2s infinite;
      flex-shrink: 0;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.3;
      }
    }

    .status-text {
      font-size: 13px;
      color: #a0aec0;
      line-height: 1.4;
    }

    .status-text strong {
      color: #fff;
      display: block;
      font-size: 14px;
    }

    .current-url {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 14px;
      font-size: 11px;
      color: #6b7280;
      word-break: break-all;
    }

    .current-url span {
      color: #9ca3af;
      display: block;
      margin-bottom: 3px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-size: 10px;
    }

    button {
      width: 100%;
      background: #CF202F;
      color: white;
      border: none;
      padding: 11px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    button:hover {
      background: #a81a26;
    }

    #statusMsg {
      margin-top: 10px;
      font-size: 12px;
      text-align: center;
      color: #6b7280;
      min-height: 16px;
    }

    .footer {
      font-size: 10px;
      color: #374151;
      margin-top: 14px;
      text-align: center;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      padding-top: 10px;
    }
  </style>
</head>

<body>
  <div class="header">
    <span>🛡️</span>
    <h2>Phish-Guard</h2>
  </div>

  <div class="status-card">
    <div class="status-dot"></div>
    <div class="status-text">
      <strong>Protection Active</strong>
      Hover over links to see security status
    </div>
  </div>

  <div class="current-url">
    <span>Current Page</span>
    <span id="currentUrl">Loading...</span>
  </div>

  <button id="reportBtn">
    🚨 Report This Site
  </button>
  <div id="statusMsg"></div>

  <div class="footer">Phish-Guard v1.1 · Coinbase Security Tool</div>

  <script src="popup.js"></script>
</body>

</html>
